version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: crewroute_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: motorcycle_rides
    ports:
      - "5433:5432"   # IMPORTANT: 5433 avoids conflict with local Postgres 18
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crewroute_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
